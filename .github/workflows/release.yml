name: Release

on:
  push:
    tags:
      # Run workflow on version tags, e.g:
      # git tag v1.0.0 -m ""
      # git push origin v1.0.0
      - "v*"

jobs:
  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - uses: pdm-project/setup-pdm@v3

      - name: Publish package distributions to PyPI
        id: publish
        run: pdm publish

